<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E2A1D"/>
      <stop offset="100%" stop-color="#2C382B"/>
    </linearGradient>
    <radialGradient id="accentGlow" cx="0.85" cy="0.15" r="0.5">
      <stop offset="0%" stop-color="#B89571" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#B89571" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#accentGlow)"/>

  <!-- wordmark glyph: deep moss square with PFP letters in walnut -->
  <g transform="translate(80, 80)">
    <rect width="72" height="72" rx="14" fill="#1E2A1D" stroke="#3A4A38" stroke-width="1"/>
    <text x="36" y="50"
          font-family="'Inter Tight', 'Inter', system-ui, sans-serif"
          font-size="30"
          font-weight="800"
          text-anchor="middle"
          fill="#B89571"
          letter-spacing="-1.5">PFP</text>
  </g>

  <!-- Brand name -->
  <text x="80" y="340" fill="#FAF7F0"
        font-family="'Inter Tight', 'Inter', system-ui, sans-serif"
        font-size="78" font-weight="600" letter-spacing="-2">
    Personal Financial Platform<tspan fill="#B89571">.</tspan>
  </text>

  <!-- Headline -->
  <text x="80" y="430" fill="#D2D5C2"
        font-family="'Inter', system-ui, sans-serif"
        font-size="40" font-weight="500">
    Pay off your home faster.
  </text>

  <!-- Tagline -->
  <text x="80" y="490" fill="#8B9785"
        font-family="'Inter', system-ui, sans-serif"
        font-size="26" font-weight="400">
    Personal finance built around homeownership.
  </text>

  <!-- Domain footer -->
  <text x="80" y="580" fill="#6B7A66"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="22" font-weight="400" letter-spacing="0.5">
    pfplatform.app
  </text>
</svg>
